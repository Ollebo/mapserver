{% extends 'base.html' %}
{% block content %}
<div class="px-6 py-3">
  <form action="/rescan" method="POST">
    <button type="submit" class="focus:outline-none text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 me-2 mb-2 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800">Rescan maps folder</button>
  </form>
</div>

{% if files %}
<table class="table-auto">
    <thead>
      <tr>
        <th>File</th>
        <th>Variants</th>
        <th>Map</th>
      </tr>
    </thead>
    <tbody>
        {% for file in files %}
        <tr>
            <td scope="col" class="px-6 py-3">{{file.filename}}</td>
            <td scope="col" class="px-6 py-3">{{ file.variants|join(', ') }}</td>
            <td scope="col" class="px-6 py-3">
              <a href="{{file.link}}">
                <button type="button" class="focus:outline-none text-white bg-yellow-400 hover:bg-yellow-500 focus:ring-4 focus:ring-yellow-300 font-medium rounded-lg text-sm px-5 py-2.5 me-2 mb-2 dark:focus:ring-yellow-900">Show Map</button>
              </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
  </table>
{% else %}
<div class="px-6 py-3 text-gray-600">
  No maps yet. Drop a <code>.tif</code> file into <code>maps/</code> and click <em>Rescan maps folder</em>, or use the upload form.
</div>
{% endif %}
{% endblock %}
