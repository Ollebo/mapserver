{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mapserver.fullname" . }}
  labels:
    {{- include "mapserver.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tlsSecret }}
  tls:
    - hosts:
        - {{ $.Values.ingress.host | quote }}
      secretName: {{ . }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.paths.terracotta }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "mapserver.fullname" . }}
                port:
                  name: terracotta
          - path: {{ .Values.ingress.paths.flask }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "mapserver.fullname" . }}
                port:
                  name: flask
{{- end }}
